name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-flight runs for the same ref (saves CI minutes on rapid pushes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0        # Disable incremental compilation in CI for cache reliability
  RUST_BACKTRACE: 1

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint & Code Quality
# Runs on: PRs + pushes to main + tags
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + components)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Security audit (cargo-audit)
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Test (Unit + Integration)
# Matrix: stable + MSRV (min supported Rust version)
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test — Rust ${{ matrix.rust }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false   # Let all matrix legs run even if one fails
      matrix:
        rust:
          - stable
          - 1.75.0     # ← Set your MSRV here (check rust-version in Cargo.toml)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.rust }}

      - name: Run unit & integration tests
        run: cargo test --all-features --workspace -- --nocapture

      - name: Run doc tests
        run: cargo test --doc --all-features --workspace

  # Code coverage — only on stable to avoid noise
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false   # Don't fail CI on coverage upload flakiness
          token: ${{ secrets.CODECOV_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Build (cross-platform release binaries)
# Only builds release artifacts when pushing to main or tagging
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [lint, test]
    if: github.event_name == 'push'   # Skip builds on PRs to save minutes
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: app-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: app-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: app-windows-amd64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # Rename binary to a consistent artifact name
      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].targets[] | select(.kind[] == "bin") | .name')
          mv target/${{ matrix.target }}/release/$BIN ${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BIN = (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages[0].targets | Where-Object { $_.kind -contains "bin" } | Select-Object -ExpandProperty name
          Move-Item "target/${{ matrix.target }}/release/$BIN.exe" "${{ matrix.artifact_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 7
